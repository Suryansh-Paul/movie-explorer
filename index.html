<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="movie-explorer">
<!--header section-->
<header>
    <h1> EVANZO MOVIE EXPLORER 🎬</h1>
    <p>Search millions of movies, explore detailed information, and save your favorites—all in one place.🍿</p>
</header>  
 <!--search section-->  
  <form id="searchform">
      <input type="text" id="searchbox" placeholder="Enter any movie name">
      <button type="submit">Search Movies🔍</button>
</form>

<!--status section-->
<div id="status"></div>
<!--movie cards section-->
<div id="moviecards"> </div>


<!--favourites-->
<div id="favorites"></div>

</div>
  <script src="index.js"></script>  
</body>
</html>
