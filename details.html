<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="movie-details-page">

    <!-- Top bar / navigation -->
    <header>
        <button id="back-button">← Back to Search</button>
        <h1>Movie Details</h1>
    </header>

    <!-- Status (loading / error) -->
    <div id="status"></div>

    <!-- Main content wrapper -->
    <div id="movie-details-container">

        <!-- Left side: Poster -->
        <div id="poster-container">
            <img id="movie-poster" alt="Movie Poster">
        </div>

        <!-- Right side: Movie info -->
        <div id="info-container">
            <h2 id="movie-title"></h2>
            <p id="movie-year"></p>
            <p id="movie-rating"></p>
            <p id="movie-genre"></p>
            <p id="movie-runtime"></p>
            <p id="movie-plot"></p>
            <p id="movie-actors"></p>
            <p id="movie-director"></p>
            <p id="movie-language"></p>
        </div>

    </div>

</div>

<script src="details.js"></script>

</body>
</html>
